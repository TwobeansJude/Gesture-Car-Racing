<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>手势赛车 V11 - JudeZHAO 版</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <style>
        :root { --bg: #f2e9e4; --road: #9a8c98; --accent: #4a4e69; --text: #22223b; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: var(--bg); font-family: "Microsoft YaHei", sans-serif; }
        #game-container { position: relative; width: 100vw; height: 100vh; display: flex; justify-content: center; background: #e9edc9; }
        canvas { display: block; background: var(--road); }
        
        /* 引导界面 UI */
        .ui-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: rgba(242, 233, 228, 0.98); z-index: 100; backdrop-filter: blur(15px); }
        .hidden { display: none !important; }
        
        /* 重新加入教程动画：双手倾斜 */
        .tutorial-box { width: 220px; height: 120px; border: 2px dashed var(--accent); border-radius: 20px; margin-bottom: 30px; display: flex; justify-content: center; align-items: center; position: relative; }
        .hand-sim { width: 35px; height: 35px; background: var(--accent); border-radius: 50%; position: absolute; opacity: 0.6; }
        .hand-l { left: 30px; animation: tiltL 2s infinite ease-in-out; }
        .hand-r { right: 30px; animation: tiltR 2s infinite ease-in-out; }
        @keyframes tiltL { 0%, 100% { transform: translateY(15px); } 50% { transform: translateY(-15px); } }
        @keyframes tiltR { 0%, 100% { transform: translateY(-15px); } 50% { transform: translateY(15px); } }

        button { padding: 18px 60px; font-size: 1.2rem; letter-spacing: 6px; background: var(--accent); color: white; border: none; border-radius: 50px; cursor: pointer; transition: 0.3s; font-weight: bold; }
        button:hover { transform: scale(1.05); }

        #dashboard { position: absolute; top: 40px; width: 100%; text-align: center; color: var(--text); z-index: 50; pointer-events: none; }
        #score-num { font-size: 3rem; font-weight: 200; }
        #level-text { font-size: 0.8rem; letter-spacing: 2px; color: var(--accent); margin-top: 5px; font-weight: bold;}
        
        #video-preview { position: absolute; bottom: 30px; right: 30px; width: 180px; height: 135px; border: 6px solid white; border-radius: 20px; transform: scaleX(-1); box-shadow: 0 10px 30px rgba(0,0,0,0.05); z-index: 60; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="dashboard">
        <div style="font-size: 0.7rem; letter-spacing: 2px; opacity: 0.6;">行驶距离 (KM)</div>
        <div id="score-num">000</div>
        <div id="level-text">道路畅通</div>
    </div>
    
    <video id="video-preview"></video>

    <div id="start-screen" class="ui-overlay">
        <h1 style="color: var(--accent); font-weight: 300; letter-spacing: 10px; margin-bottom: 20px;">手势赛车</h1>
        <div class="tutorial-box">
            <div class="hand-sim hand-l"></div>
            <div class="hand-sim hand-r"></div>
            <div style="position: absolute; bottom: 12px; font-size: 0.8rem; color: var(--accent); font-weight: bold;">双手握持并左右倾斜</div>
        </div>
        <button onclick="initSystem()">点火启动</button>
    </div>

    <div id="over-screen" class="ui-overlay hidden">
        <h2 style="color: var(--accent); letter-spacing: 4px;">任务结束</h2>
        <p id="final-score" style="margin-bottom: 30px; color: #666; font-size: 1.2rem;"></p>
        <button onclick="resetGame()">重新出发</button>
    </div>

    <canvas id="gameCanvas"></canvas>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const videoElement = document.getElementById('video-preview');
    const levelDisplay = document.getElementById('level-text');
    
    let gameState = 'START';
    let score = 0;
    let cameraInstance = null;
    let lastTime = performance.now();
    
    let currentSteer = 0; 
    let carX = 0; 
    let obstacles = [];
    let baseSpeed = 450; 
    let spawnChance = 0.025; 
    let roadOffset = 0;

    const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
    hands.setOptions({ maxNumHands: 2, modelComplexity: 1, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });

    hands.onResults((results) => {
        if (results.multiHandLandmarks && results.multiHandLandmarks.length >= 2) {
            const h1 = results.multiHandLandmarks[0][5];
            const h2 = results.multiHandLandmarks[1][5];
            const leftHand = h1.x < h2.x ? h1 : h2;
            const rightHand = h1.x < h2.x ? h2 : h1;
            const angle = Math.atan2(rightHand.y - leftHand.y, rightHand.x - leftHand.x);
            let input = -angle * 1.6; 
            currentSteer = Math.sign(input) * Math.pow(Math.abs(input), 1.8);
        } else {
            currentSteer *= 0.6; 
        }
    });

    async function initSystem() {
        document.getElementById('start-screen').classList.add('hidden');
        if (!cameraInstance) {
            cameraInstance = new Camera(videoElement, {
                onFrame: async () => { await hands.send({image: videoElement}); },
                width: 640, height: 480
            });
            await cameraInstance.start();
        }
        resetGame();
    }

    function doResize() {
        canvas.height = window.innerHeight;
        canvas.width = Math.min(window.innerWidth, 550);
    }
    window.addEventListener('resize', doResize);
    doResize();

    function resetGame() {
        score = 0; obstacles = []; carX = 0; currentSteer = 0; 
        baseSpeed = 450; spawnChance = 0.025;
        gameState = 'PLAYING';
        lastTime = performance.now();
        document.getElementById('over-screen').classList.add('hidden');
        requestAnimationFrame(gameLoop);
    }

    class Obstacle {
        constructor() {
            // 自由车道生成逻辑
            const positions = [-1, -0.5, 0, 0.5, 1];
            this.lanePos = positions[Math.floor(Math.random() * positions.length)];
            const jitter = (Math.random() - 0.5) * 0.2;
            this.x = (this.lanePos + jitter) * (canvas.width / 3.2);
            this.y = -100;
            this.speedMult = 0.85 + Math.random() * 0.45;
            this.color = ['#84a59d', '#f6bd60', '#f5cac3', '#b7b7a4'][Math.floor(Math.random()*4)];
        }
        update(dt) { this.y += (baseSpeed * this.speedMult) * dt; }
        draw() {
            const w = 40, h = 75;
            ctx.save(); ctx.translate(canvas.width/2 + this.x, this.y);
            ctx.fillStyle = 'rgba(0,0,0,0.1)'; ctx.roundRect(-w/2+4, -h/2+4, w, h, 10); ctx.fill();
            ctx.fillStyle = this.color; ctx.beginPath(); ctx.roundRect(-w/2, -h/2, w, h, 10); ctx.fill();
            ctx.restore();
        }
    }

    function updateDifficulty() {
        if (score > 10) { baseSpeed = 550; spawnChance = 0.035; levelDisplay.innerText = "车流汇入"; }
        if (score > 30) { baseSpeed = 700; spawnChance = 0.055; levelDisplay.innerText = "高速路段"; }
        if (score > 60) { baseSpeed = 850; spawnChance = 0.075; levelDisplay.innerText = "疯狂早高峰"; }
        if (score > 100) { baseSpeed = 1000; spawnChance = 0.1; levelDisplay.innerText = "超越极限"; }
    }

    function gameLoop(now) {
        if (gameState !== 'PLAYING') return;
        const dt = (now - lastTime) / 1000;
        lastTime = now;

        carX += currentSteer * 3.5 * dt; 
        carX = Math.max(-0.45, Math.min(0.45, carX));

        ctx.fillStyle = '#f2e9e4'; ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#9a8c98'; ctx.fillRect(15, 0, canvas.width - 30, canvas.height);

        roadOffset = (roadOffset + baseSpeed * dt) % 100;
        ctx.strokeStyle = 'rgba(255,255,255,0.3)';
        ctx.setLineDash([40, 60]); ctx.lineDashOffset = -roadOffset;
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.moveTo(canvas.width * 0.33, 0); ctx.lineTo(canvas.width * 0.33, canvas.height);
        ctx.moveTo(canvas.width * 0.66, 0); ctx.lineTo(canvas.width * 0.66, canvas.height);
        ctx.stroke();

        updateDifficulty();
        if (Math.random() < spawnChance) obstacles.push(new Obstacle());
        
        for (let i = obstacles.length - 1; i >= 0; i--) {
            const o = obstacles[i]; o.update(dt); o.draw();
            const playerX = canvas.width/2 + carX * (canvas.width - 60);
            const obstacleX = canvas.width/2 + o.x;
            if (Math.abs(playerX - obstacleX) < 40 && Math.abs((canvas.height - 120) - o.y) < 68) endGame();
            if (o.y > canvas.height + 150) { obstacles.splice(i, 1); score++; }
        }

        const pX = canvas.width/2 + carX * (canvas.width - 60);
        drawPlayer(pX, canvas.height - 120);
        drawWheel();
        
        // 关键：绘制 JudeZHAO 水印（优雅防盗）
        drawWatermark();

        document.getElementById('score-num').innerText = score.toString().padStart(3, '0');
        requestAnimationFrame(gameLoop);
    }

    function drawPlayer(x, y) {
        const w = 40, h = 75;
        ctx.save(); ctx.translate(x, y);
        ctx.fillStyle = 'rgba(0,0,0,0.1)'; ctx.roundRect(-w/2+4, -h/2+4, w, h, 10); ctx.fill();
        ctx.fillStyle = '#4a4e69'; ctx.beginPath(); ctx.roundRect(-w/2, -h/2, w, h, 10); ctx.fill();
        ctx.fillStyle = "#fff"; ctx.fillRect(-w/2+8, -h/2+5, 6, 3); ctx.fillRect(w/2-14, -h/2+5, 6, 3);
        ctx.restore();
    }

    function drawWheel() {
        ctx.save(); ctx.translate(canvas.width/2, canvas.height - 60);
        ctx.rotate(currentSteer * 1.2);
        ctx.strokeStyle = 'rgba(74, 78, 105, 0.4)'; ctx.lineWidth = 8;
        ctx.beginPath(); ctx.arc(0, 0, 35, 0, Math.PI * 2); ctx.stroke();
        ctx.fillStyle = 'rgba(74, 78, 105, 0.4)'; ctx.fillRect(-35, -4, 70, 8);
        ctx.restore();
    }

    // 水印绘制函数：低饱和度、半透明
    function drawWatermark() {
        ctx.save();
        ctx.fillStyle = 'rgba(74, 78, 105, 0.3)'; // 使用莫兰迪蓝变量，设置30%透明度
        ctx.font = '12px "Microsoft YaHei", sans-serif';
        ctx.textAlign = 'left';
        ctx.textBaseline = 'bottom';
        // 放在左下角，方向盘下方
        ctx.fillText('Powered by JudeZHAO', 10, canvas.height - 10); 
        ctx.restore();
    }

    function endGame() {
        gameState = 'OVER';
        document.getElementById('over-screen').classList.remove('hidden');
        document.getElementById('final-score').innerText = `最终行驶距离: ${score} 公里`;
    }
</script>
</body>
</html>
